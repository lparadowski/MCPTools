name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build:
    name: Build & format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore McpProjectTools.slnx

      - name: Build
        run: dotnet build McpProjectTools.slnx --no-restore --configuration Release

      - name: Verify code style (IDE0011 — braces on every if)
        run: dotnet format style McpProjectTools.slnx --diagnostics IDE0011 --severity warn --verify-no-changes --no-restore
